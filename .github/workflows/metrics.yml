name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      
      # Image 1: The Massive Main Stats (Fortune, Habits, Calendar, Achievements)
      - name: Main Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_branch: output
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_habits: yes
          plugin_habits_from: 100
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_notable: yes
          plugin_fortune: yes
          plugin_activity: yes
          plugin_activity_limit: 5

      # Image 2: The Detailed Stats (Languages, Dev.to Posts, Followup)
      - name: Detailed Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.detailed.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_branch: output
          base: ""
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_followup: yes
          plugin_posts: yes
          plugin_posts_source: dev.to
          plugin_posts_user: SiddhaK17 
          plugin_posts_limit: 2
