name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *" # Runs every midnight
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      
      # 1. Main Base Profile (Header & Base Stats)
      - name: Base Profile
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_branch: output
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata

      # 2. Isometric Calendar (Standalone)
      - name: 3D Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_branch: output
          base: "" # Skips the header so it's just the calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      # 3. Languages Activity (Standalone)
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_branch: output
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage

      # 4. Habits, Recent Activity & Achievements (Standalone)
      - name: Habits & Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_branch: output
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_achievements: yes
          plugin_achievements_display: compact

          # 5. Latest Dev.to Posts (Standalone)
      - name: Latest Posts
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.posts.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_branch: output
          base: ""
          plugin_posts: yes
          plugin_posts_source: dev.to
          # IMPORTANT: Change 'SiddhaK17' if your Dev.to username is different!
          plugin_posts_user: SiddhaK17 
          plugin_posts_limit: 4
